services:
  # Main Backend API
  - type: web
    name: naija-repair-api
    env: node
    rootDir: backend/node-http-server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DBSTRING
        sync: false
      - key: JWTSECRET
        sync: false
      - key: EMAIL
        sync: false
      - key: EMAILSECRET
        sync: false
      - key: PSSECRET
        sync: false
      - key: PSPUB
        sync: false
      - key: EMAIL_SERVICE_URL
        value: https://naija-repair-email.onrender.com/api/email

  # Email Microservice
  - type: web
    name: naija-repair-email
    env: node
    rootDir: backend/msg-microservice
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DBSTRING
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # Frontend
  - type: web
    name: naija-repair-frontend
    env: static
    rootDir: vite-project
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_ENV
        value: production